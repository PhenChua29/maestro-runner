# Multi-Tab Management
# Open, switch, and close browser tabs. Useful for OAuth popups,
# payment redirects, and target="_blank" links.
#
# Run: maestro-runner --platform web test examples/web/multi-tab.yaml

- launchApp

# Open a new tab with a label
- openTab:
    url: "https://accounts.google.com/oauth"
    tabLabel: "oauth"

# Do something in the OAuth tab
- assertVisible:
    text: "Sign in"

# Switch back to the main app by index
- switchTab:
    index: 0

# Switch to OAuth tab by URL pattern
- switchTab:
    url: "*/oauth*"

# Switch by label
- switchTab:
    tabLabel: "oauth"

# Close the OAuth tab (switches to remaining tab automatically)
- closeTab

# Scalar shorthand: open tab with just a URL
- openTab: "https://example.com/checkout"

# Scalar shorthand: switch by label
- switchTab: checkout
